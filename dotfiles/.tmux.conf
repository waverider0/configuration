# pane management (arrowkeys, wasd, hjkl)
bind-key Up select-pane -U
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Right select-pane -R

bind-key w select-pane -U
bind-key a select-pane -L
bind-key s select-pane -D
bind-key d select-pane -R

bind-key S split-window -v -c "#{pane_current_path}"
bind-key D split-window -h -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key J split-window -v -c "#{pane_current_path}"
bind-key L split-window -h -c "#{pane_current_path}"

# windows
bind-key c new-window -c "#{pane_current_path}"

# sessions
unbind Space
bind-key Space choose-tree -s
bind-key -T prefix Enter new-session -c "#{pane_current_path}"

##
unbind C-b
set -g prefix `
bind-key e send-prefix

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

set -g mode-keys vi
set -g base-index 1
set -g history-limit 10000
set -g bell-action none
set -g status-style bg=#111111
set -g window-status-current-style fg=#00ff77,bold
set -g pane-active-border-style fg=#00ff77
